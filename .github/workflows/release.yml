name: release

# Publishes @likhithreddy/nexus to npm from GitHub Actions with provenance
# (OIDC-signed supply-chain attestation). Triggered by pushing a v* tag.
# `npm publish` runs prepublishOnly (typecheck + tests + build) before uploading.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm --provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
